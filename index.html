<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Zeus Thunder Match</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#050816;
height:100vh;
color:white;
}

/* animated sky */

.sky{
position:fixed;
width:100%;
height:100%;
z-index:-2;
background:
linear-gradient(
180deg,
#0a1033,
#1a237e,
#0a1033
);

animation:bgmove 10s linear infinite;
}

@keyframes bgmove{

0%{
filter:hue-rotate(0deg)
}

100%{
filter:hue-rotate(40deg)
}

}

/* lightning */

.lightning{

position:absolute;
width:4px;
height:120px;

background:white;

box-shadow:
0 0 20px cyan,
0 0 60px cyan;

opacity:0;

animation:flash 4s infinite;
}

@keyframes flash{

0%,90%,100%{
opacity:0;
}

95%{
opacity:1;
}

}

h1{

padding-top:20px;
font-size:30px;

text-shadow:
0 0 20px gold;

}

.top{

display:flex;

justify-content:space-around;

padding:15px;

font-size:18px;

font-weight:bold;

}

.gameWrap{

display:flex;
justify-content:center;

}

canvas{

width:95vw;
max-width:480px;

aspect-ratio:1/1;

border-radius:25px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(8px);

box-shadow:
0 0 30px cyan;

}

.bottom{

position:fixed;

bottom:20px;

width:100%;

display:flex;

justify-content:center;

gap:15px;

}

button{

border:none;

padding:16px 28px;

border-radius:50px;

font-size:18px;

font-weight:bold;

color:white;

}

.spin{

background:
linear-gradient(
45deg,
#ff9800,
#ffd54f
);

}

.restart{

background:
linear-gradient(
45deg,
#f44336,
#e91e63
);

}

</style>
</head>

<body>

<div class="sky"></div>

<div class="lightning"
style="
left:20%;
top:10%">
</div>

<div class="lightning"
style="
left:70%;
top:30%;
animation-delay:2s">
</div>

<center>

<h1>
⚡ ZEUS MATCH ⚡
</h1>

</center>

<div class="top">

<div>
Score
<br>
<span id=score>
0
</span>
</div>

<div>
High
<br>
<span id=high>
0
</span>
</div>

</div>


<div class="gameWrap">

<canvas id=game>
</canvas>

</div>


<div class="bottom">

<button
class="spin"
onclick="spin()">

⚡ SPIN

</button>


<button
class="restart"
onclick="restartScore()">

↺ RESTART

</button>

</div>


<script>

const c=
document.getElementById("game");

const x=
c.getContext("2d");

let size=8;

let tile=64;

c.width=size*tile;
c.height=size*tile;

const items=[
"⚡",
"👑",
"💎",
"☁️",
"🔱"
];

let board=[];

let score=0;

let high=
localStorage.highZeus||0;

high.innerText=high;


function random(){

return items[
Math.floor(
Math.random()*
items.length
)
];

}


function create(){

board=[];

for(let y=0;y<size;y++){

board[y]=[];

for(let x1=0;x1<size;x1++){

board[y][x1]=random();

}

}

}


function draw(){

x.clearRect(
0,0,
c.width,
c.height
);

for(let y=0;y<size;y++){

for(let x1=0;x1<size;x1++){

x.fillStyle=
"rgba(255,255,255,.1)";

x.fillRect(
x1*tile,
y*tile,
tile-2,
tile-2
);

if(board[y][x1]){

x.font="36px Arial";

x.textAlign="center";

x.fillText(

board[y][x1],

x1*tile+32,
y*tile+42

);

}

}

}

}


function find(){

let r=[];

for(let y=0;y<size;y++){

for(let x1=0;x1<size-2;x1++){

let a=
board[y][x1];

if(
a &&
a==
board[y][x1+1]
&&
a==
board[y][x1+2]
){

r.push(
[x1,y],
[x1+1,y],
[x1+2,y]
);

}

}

}

for(let x1=0;x1<size;x1++){

for(let y=0;y<size-2;y++){

let a=
board[y][x1];

if(
a &&
a==
board[y+1][x1]
&&
a==
board[y+2][x1]
){

r.push(
[x1,y],
[x1,y+1],
[x1,y+2]
);

}

}

}

return r;

}


function destroy(){

let m=find();

if(m.length==0)return;

m.forEach(v=>{

board[
v[1]
][
v[0]
]=null;

score+=10;

});

document
.getElementById(
"score"
).innerText=score;

if(score>high){

high=score;

localStorage
.highZeus=
high;

document
.getElementById(
"high"
).innerText=
high;

}

gravity();

setTimeout(
destroy,
250
);

}


function gravity(){

for(
let x1=0;
x1<size;
x1++
){

for(
let y=size-1;
y>=0;
y--
){

if(
board[y][x1]
==null
){

for(
let yy=y;
yy>0;
yy--
){

board[yy][x1]
=
board[
yy-1
][x1];

}

board[0][x1]=
random();

}

}

}

draw();

}


function spin(){

create();

draw();

setTimeout(
destroy,
300
);

}


function restartScore(){

score=0;

document
.getElementById(
"score"
).innerText=0;

spin();

}


spin();

</script>

</body>
</html>
